name: Deploy to Staging (Cloudways)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, pdo_mysql, redis, gd, zip, exif
          coverage: none
          tools: composer:v2

      - name: Validate composer files
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare SQLite file for Composer / Artisan
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDWAYS_STAGING_SSH_PRIVATE_KEY }}

      - name: Add Cloudways host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CLOUDWAYS_STAGING_SSH_PORT || 22 }} -H ${{ secrets.CLOUDWAYS_STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files to Cloudways via rsync
        run: |
          rsync -avz --delete --no-perms --no-owner --omit-dir-times \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='.env.testing' \
            --exclude='.env.testing.example' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='.phpunit.result.cache' \
            --exclude='phpunit.xml' \
            -e "ssh -p ${{ secrets.CLOUDWAYS_STAGING_SSH_PORT || 22 }}" \
            ./ ${{ secrets.CLOUDWAYS_STAGING_SSH_USER }}@${{ secrets.CLOUDWAYS_STAGING_SSH_HOST }}:${{ secrets.CLOUDWAYS_STAGING_APP_PATH }}/

      - name: Run post-deploy commands on Cloudways
        run: |
          ssh -p ${{ secrets.CLOUDWAYS_STAGING_SSH_PORT || 22 }} \
            ${{ secrets.CLOUDWAYS_STAGING_SSH_USER }}@${{ secrets.CLOUDWAYS_STAGING_SSH_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.CLOUDWAYS_STAGING_APP_PATH }}

            php artisan down --render="errors::503" --retry=30 || true

            php artisan storage:link || true

            php artisan migrate --force

            php artisan release:init

            php artisan optimize:clear
            php artisan optimize

            php artisan queue:restart || true

            php artisan up
          ENDSSH

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Staging deployment succeeded."
          else
            echo "Staging deployment failed."
          fi
