name: Deploy to Production (Cloudways)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudways
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, pdo_mysql, redis, gd, zip, exif
          coverage: none
          tools: composer:v2

      - name: Validate composer files
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # No .env on the runner: default DB is sqlite at database/database.sqlite.
      # package:discover boots the app; Schema::hasTable needs that file to exist.
      - name: Prepare SQLite file for Composer / Artisan
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDWAYS_SSH_PRIVATE_KEY }}

      - name: Add Cloudways host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CLOUDWAYS_SSH_PORT || 22 }} -H ${{ secrets.CLOUDWAYS_SSH_HOST }} >> ~/.ssh/known_hosts

      # Secrets pasted in GitHub often include a trailing newline — that breaks ssh/rsync/cd.
      - name: Normalize CLOUDWAYS_APP_PATH
        id: cw_path
        env:
          RAW: ${{ secrets.CLOUDWAYS_APP_PATH }}
        run: |
          P=$(printf '%s' "$RAW" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$P" ]; then
            echo "::error::CLOUDWAYS_APP_PATH secret is empty."
            exit 1
          fi
          case "$P" in
            /*) ;;
            *)
              echo "::error::CLOUDWAYS_APP_PATH must be absolute (begin with /)."
              exit 1
              ;;
          esac
          {
            echo "deploy_path<<__CW_PATH__"
            printf '%s\n' "$P"
            echo "__CW_PATH__"
          } >> "$GITHUB_OUTPUT"

      # Do not mkdir here (app user cannot create under /home/master_...). Use a real write
      # probe: test -w is unreliable on some hosts; touch matches what rsync needs.
      - name: Verify remote deploy directory exists and is writable
        env:
          DEPLOY_PATH: ${{ steps.cw_path.outputs.deploy_path }}
        run: |
          REMOTE=$(printf '%q' "set -e; test -d \"$DEPLOY_PATH\" || exit 2; touch \"$DEPLOY_PATH/.cw-gha-write-check\" && rm -f \"$DEPLOY_PATH/.cw-gha-write-check\"")
          if ! ssh -p ${{ secrets.CLOUDWAYS_SSH_PORT || 22 }} \
            ${{ secrets.CLOUDWAYS_SSH_USER }}@${{ secrets.CLOUDWAYS_SSH_HOST }} \
            "bash -lc $REMOTE"; then
            echo "::error::SSH user cannot open or write to CLOUDWAYS_APP_PATH."
            echo "Fix: use the same username as in Cloudways for that path (master vs application)."
            echo "Master: /home/master_xxx/applications/<folder>/public_html"
            echo "Application user: path from Application → Access Details (often *cloudwaysapps.com*/.../public_html)."
            exit 1
          fi

      - name: Deploy files to Cloudways via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='.env.testing' \
            --exclude='.env.testing.example' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='.phpunit.result.cache' \
            --exclude='phpunit.xml' \
            -e "ssh -p ${{ secrets.CLOUDWAYS_SSH_PORT || 22 }}" \
            ./ ${{ secrets.CLOUDWAYS_SSH_USER }}@${{ secrets.CLOUDWAYS_SSH_HOST }}:${{ steps.cw_path.outputs.deploy_path }}/

      - name: Run post-deploy commands on Cloudways
        run: |
          ssh -p ${{ secrets.CLOUDWAYS_SSH_PORT || 22 }} \
            ${{ secrets.CLOUDWAYS_SSH_USER }}@${{ secrets.CLOUDWAYS_SSH_HOST }} << 'ENDSSH'
            set -e
            cd ${{ steps.cw_path.outputs.deploy_path }}

            php artisan down --render="errors::503" --retry=30 || true

            php artisan storage:link || true

            php artisan migrate --force

            php artisan release:init

            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            php artisan queue:restart || true

            php artisan up
          ENDSSH

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment succeeded."
          else
            echo "Deployment failed."
          fi
